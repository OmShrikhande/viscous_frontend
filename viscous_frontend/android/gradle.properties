# Conservative heap: very large -Xmx values reserve address space and can cause the
# Gradle daemon to be killed under memory pressure (emulator + Studio + workers).
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx1536m
org.gradle.parallel=true
org.gradle.caching=true
android.useAndroidX=true
