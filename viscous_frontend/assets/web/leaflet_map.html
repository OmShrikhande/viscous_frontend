<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <style>
    html, body, #map { height: 100%; margin: 0; padding: 0; background: #0a0e21; }
    .leaflet-container { background: #0a0e21; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    (function () {
      var map = L.map('map', { zoomControl: true }).setView([20.5937, 78.9629], 5); // Center of India
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);

      // Realistic square bus icon
      var busIcon = L.divIcon({
        className: 'bus-marker',
        html: '<div style="width:40px;height:20px;background:#002366;border:2px solid #E1AD01;border-radius:3px;position:relative;"><div style="position:absolute;top:2px;left:2px;width:6px;height:6px;background:#E1AD01;border-radius:50%;"></div><div style="position:absolute;top:2px;right:2px;width:6px;height:6px;background:#E1AD01;border-radius:50%;"></div><div style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:8px;height:4px;background:#E1AD01;border-radius:1px;"></div></div>',
        iconSize: [40, 20],
        iconAnchor: [20, 10]
      });

      var marker = null;

      // Function called from Flutter to update bus position
      window.updateBusPosition = function(lat, lng) {
        if (marker) {
          marker.setLatLng([lat, lng]);
        } else {
          marker = L.marker([lat, lng], { icon: busIcon }).addTo(map);
        }
        map.setView([lat, lng], 15, { animate: true, duration: 1 });
      };
    })();
  </script>
</body>
</html>
